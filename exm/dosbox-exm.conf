[dosbox]
machine=cga
memsize=2

[render]
scaler=none

[cpu]
cputype=286
cycles=5000

[serial]
serial1=nullmodem server port:5001

[dos]
hard drive data rate limit=0

[autoexec]
# Mount wordlelx repo as C:, EXM repo as D:
mount c /Users/jarrod/github/wordlelx
mount d /Users/jarrod/github/EXM

SET PATH=D:\TOOLS;D:\TSR;%PATH%

c:
cd exm

# Step 1: Convert WORDLELX.EXE -> WORDLELX.EXM
E2M WORDLELX

# Step 2: Create directories TKERNEL expects (hardcoded in its binary)
#   C:\_SYS\ — where TKERNEL scans for .EXM app files
#   C:\CPACK100\ — where TKERNEL looks for its font (CPACK100.FNT)
mkdir C:\_SYS
mkdir C:\CPACK100
copy C:\EXM\WORDLELX.EXM C:\_SYS\
copy C:\exm\WORDLELX.ICN C:\_SYS\
copy D:\TSR\CPACK100.FNT C:\CPACK100\

# Step 3: Load CGA graphics TSR
CGAGRAPH

# Step 4: Launch System Manager emulator — Wordle LX should appear in app list
TKERNEL
